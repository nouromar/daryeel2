services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-daryeel2}
      POSTGRES_USER: ${POSTGRES_USER:-daryeel2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-daryeel2}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "8010:8010"
    environment:
      API_APP_ENV: docker
      API_PUBLIC_BASE_URL: ${API_PUBLIC_BASE_URL:-http://localhost:8010}
      DATABASE_URL: ${API_DATABASE_URL:-postgresql+psycopg://daryeel2:daryeel2@postgres:5432/daryeel2}
      API_REDIS_URL: ${API_REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx,sys; sys.exit(0 if httpx.get('http://localhost:8010/health', timeout=2).status_code==200 else 1)",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  schema-service:
    build:
      context: .
      dockerfile: services/schema-service/Dockerfile
    ports:
      - "8011:8011"
    volumes:
      # Dev convenience: let local schema edits take effect on container restart.
      - ./apps/customer-app/schemas:/workspace/daryeel/Daryeel2/apps/customer-app/schemas:ro
      # Dev convenience: let local contract edits take effect on container restart.
      - ./apps/customer-app/contracts:/workspace/daryeel/Daryeel2/apps/customer-app/contracts:ro
      # Dev convenience: shared contracts/themes are copied into the image, so
      # bind-mount them to avoid rebuilds when iterating on shared definitions.
      - ./packages/component-contracts:/workspace/daryeel/Daryeel2/packages/component-contracts:ro
      - ./packages/theme-contracts:/workspace/daryeel/Daryeel2/packages/theme-contracts:ro
      - ./packages/schema-contracts:/workspace/daryeel/Daryeel2/packages/schema-contracts:ro
    environment:
      SCHEMA_SERVICE_APP_ENV: docker
      # Unified runtime service for schema, theme, and config delivery.
      # Bootstrap should advertise a usable host URL by default in Docker.
      SCHEMA_SERVICE_PUBLIC_BASE_URL: ${SCHEMA_SERVICE_PUBLIC_BASE_URL:-http://localhost:8011}
      # Optional. When unset, schema-service uses in-process caching only.
      SCHEMA_SERVICE_REDIS_URL: ${SCHEMA_SERVICE_REDIS_URL:-redis://redis:6379/0}
      SCHEMA_SERVICE_REDIS_KEY_PREFIX: ${SCHEMA_SERVICE_REDIS_KEY_PREFIX:-daryeel2:schema-service:}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx,sys; sys.exit(0 if httpx.get('http://localhost:8011/health', timeout=2).status_code==200 else 1)",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
